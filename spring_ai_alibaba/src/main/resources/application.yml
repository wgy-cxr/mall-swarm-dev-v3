server:
  port: 8089
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  application:

    name: spring_ai_alibaba

  ai:
    dashscope:
      api-key: ${ANTHROPIC_API_KEY}

springdoc:
  swagger-ui:
    # 修改Swagger UI路径
    path: /swagger-ui.html
    # 开启Swagger UI界面
    enabled: true
    # 用于配置tag和operation的展开方式，这里配置为都不展开
    doc-expansion: 'none'
  api-docs:
    # 修改api-docs路径
    path: /v3/api-docs
    # 开启api-docs
    enabled: true
  group-configs:
    - group: 'mall-portal'
      packages-to-scan: com.macro.mall.springai.controller